<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pandora Inventory — Складской учёт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.2s, color 0.2s, border 0.2s;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #f0f0f0;
        }
        /* Темы */
        body.theme-light { background: #f5f5f5; color: #111; }
        body.theme-light .card, body.theme-light .top-bar, body.theme-light .auth-box, body.theme-light .modal-content { background: #fff; color: #111; border-color: #ddd; }
        body.theme-light button { background: #e0e0e0; color: #111; }
        body.theme-light button.primary { background: #ff8c00; color: #fff; }
        body.theme-darkorange { background: #1e1e1e; color: #ffb347; }
        body.theme-darkorange .card, body.theme-darkorange .top-bar, body.theme-darkorange .auth-box, body.theme-darkorange .modal-content { background: #2c2c2c; color: #ffb347; border-color: #ff8c00; }
        body.theme-darkorange button { background: #3a3a3a; color: #ffb347; border-color: #ff8c00; }
        body.theme-darkorange button.primary { background: #ff8c00; color: #1e1e1e; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        /* Авторизация */
        .auth-box { max-width: 450px; margin: 80px auto; background: #2c2c2c; padding: 30px; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: #ff8c00; }
        .auth-box input, .auth-box select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #555; background: #1e1e1e; color: inherit; }
        .auth-box button { width: 100%; padding: 12px; background: #ff8c00; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .auth-link { text-align: center; margin-top: 15px; font-size: 0.9rem; cursor: pointer; color: #ff8c00; }
        /* Главная панель */
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; background: #2c2c2c; padding: 12px 20px; border-radius: 20px; margin-bottom: 20px; gap: 10px; }
        .timer-area { font-size: 1.2rem; font-weight: bold; }
        .theme-btn { background: none; border: 1px solid #ff8c00; padding: 6px 12px; border-radius: 30px; cursor: pointer; margin-left: 5px; }
        .buttons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; margin: 20px 0; }
        .buttons-grid button { padding: 14px; border-radius: 16px; border: none; background: #3a3a3a; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .card { background: #2c2c2c; border-radius: 24px; padding: 20px; margin-top: 20px; overflow-x: auto; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #2c2c2c; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; border-radius: 28px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #555; padding: 8px; text-align: left; }
        input, select, textarea { background: #1e1e1e; border: 1px solid #ff8c00; padding: 8px; border-radius: 12px; width: 100%; margin: 5px 0; color: inherit; }
        .barcode-qr-side { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
        .barcode-container, .qr-container { background: white; padding: 10px; border-radius: 16px; text-align: center; }
        .success-toast { position: fixed; bottom: 20px; right: 20px; background: #4caf50; color: white; padding: 12px 20px; border-radius: 40px; z-index: 1100; }
        button:active { transform: scale(0.97); }
        img.product-img { max-width: 100px; max-height: 100px; border-radius: 12px; }
        hr { border-color: #ff8c00; margin: 15px 0; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        @media (max-width: 700px) { .buttons-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="app">
    <!-- Экран авторизации -->
    <div id="authScreen" class="auth-box">
        <h2><i class="fas fa-boxes"></i> Pandora Inventory</h2>
        <input type="email" id="loginEmail" placeholder="Email сотрудника">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="doLoginBtn"><i class="fas fa-sign-in-alt"></i> Вход</button>
        <div class="auth-link" id="forgotPasswordLink">Забыли пароль?</div>
        <div class="footer-info" style="margin-top:20px;">© Складская система</div>
    </div>

    <!-- Главное приложение -->
    <div id="mainApp" style="display: none;">
        <div class="container">
            <div class="top-bar">
                <div class="timer-area"><i class="fas fa-stopwatch"></i> Смена: <span id="shiftTimer">00:00:00</span></div>
                <div><i class="fas fa-user-cog"></i> <span id="currentUserRole"></span> — <span id="currentUserEmail"></span></div>
                <div>
                    <button class="theme-btn" data-theme="dark">🌙 Тёмная</button>
                    <button class="theme-btn" data-theme="light">☀️ Светлая</button>
                    <button class="theme-btn" data-theme="darkorange">🔥 Оранжевая</button>
                </div>
            </div>
            <div class="buttons-grid" id="mainButtonsGrid"></div>
            <div id="dynamicContent" class="card">
                <p>👋 Добро пожаловать. Выберите действие из меню.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ------------------- ХРАНИЛИЩЕ -------------------
    let db = {
        users: [],
        products: [],
        avitoListings: [],
        avitoTransactions: [],
        checks: [],
        lastSync: null,
        lastCheck: null,
        shiftStart: null
    };

    function loadData() {
        const saved = localStorage.getItem("pandora_inv_final");
        if(saved) {
            db = JSON.parse(saved);
            // Обновление пароля главного админа
            const admin = db.users.find(u => u.email === "Ushimura@pandora.biz");
            if(admin && admin.password !== "ushimura291_biz_biz") admin.password = "ushimura291_biz_biz";
        } else {
            db.users = [{
                email: "Ushimura@pandora.biz",
                password: "ushimura291_biz_biz",
                role: "Администратор",
                name: "Ushimura",
                secretQuestion: "Любимый цвет?",
                secretAnswer: "оранжевый"
            }];
            db.products = [];
            db.avitoListings = [];
            db.avitoTransactions = [];
            db.checks = [];
            db.lastSync = null;
            db.lastCheck = null;
            db.shiftStart = null;
        }
        saveData();
    }
    function saveData() { localStorage.setItem("pandora_inv_final", JSON.stringify(db)); }

    let currentUser = null;
    let shiftInterval = null;

    // DOM элементы
    const authScreen = document.getElementById("authScreen");
    const mainApp = document.getElementById("mainApp");
    const loginBtn = document.getElementById("doLoginBtn");
    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const forgotLink = document.getElementById("forgotPasswordLink");
    const shiftTimerSpan = document.getElementById("shiftTimer");
    const currentUserRoleSpan = document.getElementById("currentUserRole");
    const currentUserEmailSpan = document.getElementById("currentUserEmail");
    const dynamicContent = document.getElementById("dynamicContent");
    const buttonsGrid = document.getElementById("mainButtonsGrid");

    function showToast(msg) {
        const t = document.createElement("div");
        t.className = "success-toast"; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    function applyTheme(theme) {
        document.body.classList.remove("theme-light", "theme-darkorange");
        if(theme === "light") document.body.classList.add("theme-light");
        else if(theme === "darkorange") document.body.classList.add("theme-darkorange");
        localStorage.setItem("pandora_theme", theme);
    }

    function startShiftTimer() {
        if(shiftInterval) clearInterval(shiftInterval);
        shiftInterval = setInterval(() => {
            if(!db.shiftStart) return;
            const diff = Math.floor((new Date() - new Date(db.shiftStart)) / 1000);
            const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
            shiftTimerSpan.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function hasRole(allowed) { return currentUser && allowed.includes(currentUser.role); }

    function renderMainButtons() {
        const btns = [
            { id:"viewProducts", label:"📦 Просмотр товара", roles:["Администратор","Модератор","HR","Смотрящий/кладовщик"] },
            { id:"uploadPinpad", label:"📲 Выгрузка на пинпад", roles:["Администратор","Модератор","Смотрящий/кладовщик"] },
            { id:"addProduct", label:"➕ Добавить товар", roles:["Администратор","Модератор"] },
            { id:"inventory", label:"🔍 Инвентаризация", roles:["Администратор","Модератор","Смотрящий/кладовщик"] },
            { id:"manageUsers", label:"👥 Работники", roles:["Администратор"] },
            { id:"switchUser", label:"🔄 Сменить пользователя", roles:["Администратор","Модератор","HR","Смотрящий/кладовщик"] },
            { id:"avitoTransactions", label:"💰 Авито транзакции", roles:["Администратор","Модератор","HR"] },
            { id:"salary", label:"💵 Зарплата сотрудникам", roles:["Администратор"] },
            { id:"avitoCheck", label:"🧾 Выдать чек для Авито", roles:["Администратор","Модератор"] },
            { id:"lastSyncInfo", label:"🕒 Последняя синхронизация", roles:["Администратор","Модератор","Смотрящий/кладовщик"] },
            { id:"resetConfig", label:"⚠️ Сброс конфигурации", roles:["Администратор"] },
            { id:"showLastCheck", label:"📄 Последний чек", roles:["Администратор","Модератор","HR"] },
            { id:"avitoExposition", label:"🏷️ Авито выставка", roles:["Администратор","Модератор"] },
            { id:"helpDoc", label:"❓ Помощь", roles:["Администратор","Модератор","HR","Смотрящий/кладовщик"] }
        ];
        buttonsGrid.innerHTML = "";
        btns.forEach(btn => {
            if(hasRole(btn.roles)) {
                const b = document.createElement("button");
                b.innerHTML = btn.label;
                b.onclick = () => window[btn.id]();
                buttonsGrid.appendChild(b);
            }
        });
    }

    // ---------- МОДУЛИ ----------
    window.viewProducts = function() {
        if(!db.products.length) { dynamicContent.innerHTML = `<p>📭 Нет товаров. Добавьте через "➕ Добавить товар".</p>`; return; }
        let html = `<h3>Список товаров</h3><select id="productSelect" style="margin-bottom:10px">`;
        db.products.forEach(p => { html += `<option value="${p.id}">${p.name} (${p.barcode})</option>`; });
        html += `</select><button class="primary" id="showProductDetails">Показать штрихкод/QR/фото</button>
        <div id="productDetailArea"></div><hr><button id="editProductBtn">✏️ Редактировать товар</button>
        <button id="deleteProductBtn" style="background:#b33;">🗑️ Удалить товар</button>`;
        dynamicContent.innerHTML = html;
        const showBtn = document.getElementById("showProductDetails");
        const editBtn = document.getElementById("editProductBtn");
        const delBtn = document.getElementById("deleteProductBtn");
        showBtn.onclick = () => {
            const pid = parseInt(document.getElementById("productSelect").value);
            const prod = db.products.find(p => p.id === pid);
            if(prod) {
                const area = document.getElementById("productDetailArea");
                area.innerHTML = `<div><strong>${prod.name}</strong><br>Штрихкод: ${prod.barcode}<br>Цена: ${prod.price}₽<br>Параметры: ${prod.parameters || "—"}<br>
                ${prod.image ? `<img src="${prod.image}" class="product-img"><br>` : ""}</div>
                <div class="barcode-qr-side"><div class="barcode-container"><svg id="barcodeGen"></svg></div><div class="qr-container"><div id="qrCodeGen"></div></div></div>`;
                setTimeout(() => {
                    JsBarcode("#barcodeGen", prod.barcode, { format: "CODE128", width:2, height:50 });
                    document.getElementById("qrCodeGen").innerHTML = "";
                    new QRCode(document.getElementById("qrCodeGen"), { text: `ТОВАР:${prod.barcode}|${prod.name}|${prod.price}`, width:128, height:128 });
                }, 50);
            }
        };
        editBtn.onclick = () => {
            const pid = parseInt(document.getElementById("productSelect").value);
            const prod = db.products.find(p => p.id === pid);
            if(!prod) return;
            const newName = prompt("Новое название", prod.name);
            const newPrice = parseFloat(prompt("Новая цена", prod.price));
            const newParams = prompt("Параметры", prod.parameters);
            if(newName && !isNaN(newPrice)) { prod.name = newName; prod.price = newPrice; prod.parameters = newParams; saveData(); showToast("Товар обновлён"); viewProducts(); }
        };
        delBtn.onclick = () => { if(confirm("Удалить товар?")) { const pid = parseInt(document.getElementById("productSelect").value); db.products = db.products.filter(p => p.id !== pid); saveData(); showToast("Удалено"); viewProducts(); } };
    };

    window.addProduct = function() {
        dynamicContent.innerHTML = `
            <h3>➕ Добавление товара (несколько штрихкодов — каждый с новой строки)</h3>
            <input type="text" id="prodName" placeholder="Название товара">
            <textarea id="prodBarcodes" rows="3" placeholder="Введите штрихкоды (каждый с новой строки)&#10;Например:&#10;4601234567890&#10;4601234567891"></textarea>
            <input type="number" id="prodPrice" placeholder="Цена">
            <input type="text" id="prodParams" placeholder="Параметры (размер, цвет)">
            <input type="file" id="prodImage" accept="image/*">
            <button id="saveMultiProductBtn" class="primary">Сохранить (все штрихкоды → отдельные товары)</button>
        `;
        document.getElementById("saveMultiProductBtn").onclick = () => {
            const name = document.getElementById("prodName").value.trim();
            const barcodesText = document.getElementById("prodBarcodes").value;
            const price = parseFloat(document.getElementById("prodPrice").value);
            const params = document.getElementById("prodParams").value;
            if(!name || !barcodesText || isNaN(price)) { alert("Заполните название, хотя бы один штрихкод и цену"); return; }
            const barcodeList = barcodesText.split(/\r?\n/).filter(b => b.trim().length > 0);
            if(barcodeList.length === 0) { alert("Введите хотя бы один штрихкод"); return; }
            const file = document.getElementById("prodImage").files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageBase64 = e.target.result;
                for(let bc of barcodeList) {
                    if(db.products.some(p => p.barcode === bc.trim())) { alert(`Штрихкод ${bc} уже существует, пропущен`); continue; }
                    db.products.push({ id: Date.now()+Math.random(), name, barcode: bc.trim(), price, parameters: params, quantity: 0, image: imageBase64 || null });
                }
                saveData();
                showToast(`Добавлено ${barcodeList.length} товаров`);
                viewProducts();
            };
            if(file) reader.readAsDataURL(file);
            else reader.onload({ target: { result: null } });
        };
    };

    window.inventory = function() {
        function renderInv() {
            let list = db.products.map(p => `<li><strong>${p.name}</strong> (${p.barcode}) — кол-во: ${p.quantity || 0} 
            <button class="invInc" data-id="${p.id}">+1</button> <button class="invDec" data-id="${p.id}">-1</button>
            <input type="number" id="setQty_${p.id}" placeholder="новое кол-во" style="width:80px;"> <button class="invSet" data-id="${p.id}">Установить</button></li>`).join("");
            document.getElementById("inventoryList").innerHTML = list;
            document.querySelectorAll(".invInc").forEach(btn => btn.onclick = () => { let p = db.products.find(x=>x.id==parseInt(btn.dataset.id)); if(p){ p.quantity=(p.quantity||0)+1; saveData(); renderInv(); } });
            document.querySelectorAll(".invDec").forEach(btn => btn.onclick = () => { let p = db.products.find(x=>x.id==parseInt(btn.dataset.id)); if(p && p.quantity>0){ p.quantity--; saveData(); renderInv(); } });
            document.querySelectorAll(".invSet").forEach(btn => btn.onclick = () => { let p = db.products.find(x=>x.id==parseInt(btn.dataset.id)); let newQty = parseInt(document.getElementById(`setQty_${p.id}`).value); if(!isNaN(newQty) && newQty>=0){ p.quantity=newQty; saveData(); renderInv(); } });
        }
        dynamicContent.innerHTML = `<h3>📦 Инвентаризация</h3><input type="text" id="scanInvBarcode" placeholder="Сканируйте штрихкод для +1"><button id="scanAddBtn">+1 по штрихкоду</button><hr><ul id="inventoryList"></ul>`;
        renderInv();
        document.getElementById("scanAddBtn").onclick = () => {
            let bc = document.getElementById("scanInvBarcode").value.trim();
            let p = db.products.find(x=>x.barcode===bc);
            if(p){ p.quantity=(p.quantity||0)+1; saveData(); renderInv(); document.getElementById("scanInvBarcode").value=""; showToast(`+1 ${p.name}`); }
            else alert("Товар не найден");
        };
    };

    window.manageUsers = function() {
        let html = `<h3>👥 Управление сотрудниками</h3><button id="newUserBtn">+ Добавить сотрудника</button><table><th>Email</th><th>Имя</th><th>Роль</th><th>Секретный вопрос</th><th>Действия</th></tr>`;
        db.users.forEach(u => {
            html += `<tr><td>${u.email}</td><td><input type="text" class="userName" data-email="${u.email}" value="${u.name||''}"></td>
            <td><select class="userRole" data-email="${u.email}"><option ${u.role==="Администратор"?"selected":""}>Администратор</option><option ${u.role==="Модератор"?"selected":""}>Модератор</option><option ${u.role==="HR"?"selected":""}>HR</option><option ${u.role==="Смотрящий/кладовщик"?"selected":""}>Смотрящий/кладовщик</option></select></td>
            <td><button class="editSecret" data-email="${u.email}">Изменить вопрос/ответ</button></td>
            <td><button class="delUser" data-email="${u.email}" ${u.email==="Ushimura@pandora.biz"?"disabled":""}>Удалить</button></td></tr>`;
        });
        html += `</table>`;
        dynamicContent.innerHTML = html;
        document.querySelectorAll(".userName").forEach(inp => inp.addEventListener("change", (e) => { let user = db.users.find(u=>u.email===inp.dataset.email); if(user) user.name = inp.value; saveData(); }));
        document.querySelectorAll(".userRole").forEach(sel => sel.addEventListener("change", (e) => { let user = db.users.find(u=>u.email===sel.dataset.email); if(user && user.email!=="Ushimura@pandora.biz") user.role = sel.value; saveData(); }));
        document.querySelectorAll(".editSecret").forEach(btn => btn.onclick = () => { let user = db.users.find(u=>u.email===btn.dataset.email); if(user){ let q = prompt("Секретный вопрос", user.secretQuestion||""); let a = prompt("Ответ на вопрос", user.secretAnswer||""); if(q && a){ user.secretQuestion=q; user.secretAnswer=a.toLowerCase(); saveData(); showToast("Обновлено"); } } });
        document.querySelectorAll(".delUser").forEach(btn => btn.onclick = () => { if(confirm("Удалить пользователя?")){ db.users = db.users.filter(u=>u.email!==btn.dataset.email); saveData(); manageUsers(); } });
        document.getElementById("newUserBtn").onclick = () => {
            let email = prompt("Email нового сотрудника");
            if(!email || db.users.find(u=>u.email===email)) { alert("Email существует или пуст"); return; }
            let pass = prompt("Пароль");
            let name = prompt("Имя");
            let role = prompt("Роль (Администратор/Модератор/HR/Смотрящий/кладовщик)", "Смотрящий/кладовщик");
            let secQ = prompt("Секретный вопрос (для восстановления пароля)");
            let secA = prompt("Ответ на секретный вопрос");
            if(role && !["Администратор","Модератор","HR","Смотрящий/кладовщик"].includes(role)) role="Смотрящий/кладовщик";
            db.users.push({ email, password: pass, name, role, secretQuestion: secQ, secretAnswer: secA?.toLowerCase() });
            saveData();
            manageUsers();
        };
    };

    window.switchUser = function() { location.reload(); };
    window.avitoTransactions = function() {
        let html = `<h3>💰 Авито транзакции</h3><button id="addTransBtn">+ Новая транзакция</button><table><th>ID</th><th>Тип</th><th>Покупатель</th><th>Сумма</th><th>Работник</th><th></th></tr>`;
        db.avitoTransactions.forEach(t => {
            html += `<tr><td>${t.transactionId}</td><td>${t.type}</td><td>${t.buyerName}</td><td>${t.amount}₽</td><td>${t.worker}</td><td><button class="delTrans" data-id="${t.id}">❌</button></td></tr>`;
        });
        html += `</table>`;
        dynamicContent.innerHTML = html;
        document.getElementById("addTransBtn").onclick = () => {
            let tid = prompt("ID транзакции");
            let type = prompt("Тип (доставка/личная встреча)");
            let contact = prompt("Контакт");
            let buyer = prompt("ФИО покупателя");
            let worker = prompt("Работник", currentUser.name || currentUser.email);
            let amount = parseFloat(prompt("Сумма"));
            if(tid && amount) {
                db.avitoTransactions.push({ id: Date.now(), transactionId: tid, type, contact, buyerName: buyer, worker, amount, date: new Date().toISOString() });
                saveData(); avitoTransactions();
            }
        };
        document.querySelectorAll(".delTrans").forEach(btn => btn.onclick = () => { db.avitoTransactions = db.avitoTransactions.filter(t=>t.id!=parseInt(btn.dataset.id)); saveData(); avitoTransactions(); });
    };
    window.avitoExposition = function() {
        let html = `<h3>🏷️ Авито выставка</h3><button id="addListingBtn">+ Выставить товар</button><table><th>Товар</th><th>Цена</th><th>Статус</th><th>Действие</th></table>`;
        db.avitoListings.forEach(l => {
            html += `<tr><td>${l.productName}</td><td>${l.price}₽</td><td>${l.status}</td><td><button class="toggleStatus" data-id="${l.id}">Сменить статус</button> <button class="delListing" data-id="${l.id}">Удалить</button></td></tr>`;
        });
        html += `</table>`;
        dynamicContent.innerHTML = html;
        document.getElementById("addListingBtn").onclick = () => { let pn = prompt("Название товара"); let pr = parseFloat(prompt("Цена")); if(pn && pr){ db.avitoListings.push({ id:Date.now(), productName:pn, price:pr, status:"не продан" }); saveData(); avitoExposition(); } };
        document.querySelectorAll(".toggleStatus").forEach(btn => btn.onclick = () => { let l = db.avitoListings.find(x=>x.id==parseInt(btn.dataset.id)); if(l){ l.status = l.status==="продан" ? "не продан" : "продан"; saveData(); avitoExposition(); } });
        document.querySelectorAll(".delListing").forEach(btn => btn.onclick = () => { db.avitoListings = db.avitoListings.filter(x=>x.id!=parseInt(btn.dataset.id)); saveData(); avitoExposition(); });
    };
    window.salary = function() {
        if(currentUser.email !== "Ushimura@pandora.biz") { alert("Доступно только администратору"); return; }
        const now = new Date(); const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const totalMonth = db.avitoTransactions.filter(t => new Date(t.date) >= monthStart).reduce((s,t)=>s+(t.amount||0),0);
        const fund = totalMonth * 0.3;
        let html = `<h3>💵 Зарплаты (фонд 30% от выручки)</h3><p>Выручка за месяц: ${totalMonth}₽ | Фонд: ${fund.toFixed(2)}₽</p>
        <table><tr><th>Роль</th><th>Процент</th><th>Сумма</th></tr>
        <tr><td>Администратор</td><td><input id="pAdmin" value="50"></td><td id="sumAdmin">0</td></tr>
        <tr><td>Модератор</td><td><input id="pMod" value="30"></td><td id="sumMod">0</td></tr>
        <tr><td>HR</td><td><input id="pHr" value="10"></td><td id="sumHr">0</td></tr>
        <tr><td>Смотрящий/кладовщик</td><td><input id="pWatch" value="10"></td><td id="sumWatch">0</td></tr></table>
        <button id="calcSalary">Рассчитать</button>`;
        dynamicContent.innerHTML = html;
        document.getElementById("calcSalary").onclick = () => {
            let pa = parseFloat(document.getElementById("pAdmin").value)/100;
            let pm = parseFloat(document.getElementById("pMod").value)/100;
            let ph = parseFloat(document.getElementById("pHr").value)/100;
            let pw = parseFloat(document.getElementById("pWatch").value)/100;
            document.getElementById("sumAdmin").innerText = (fund*pa).toFixed(2);
            document.getElementById("sumMod").innerText = (fund*pm).toFixed(2);
            document.getElementById("sumHr").innerText = (fund*ph).toFixed(2);
            document.getElementById("sumWatch").innerText = (fund*pw).toFixed(2);
        };
    };
    window.avitoCheck = function() {
        let chNum = db.checks.length+1;
        dynamicContent.innerHTML = `<h3>🧾 Генерация чека Авито</h3>
        <input id="docName" value="Чек №${chNum}"><input id="org" value="ООО Пандора"><input id="inn" value="1234567890">
        <input id="tax" value="УСН"><input id="payType" value="Приход"><input id="goods" placeholder="Товар" value="Товар с Авито">
        <input id="qty" type="number" value="1"><input id="price" type="number" placeholder="Цена за ед."><input id="method" value="Наличные">
        <button id="genCheckBtn">Сформировать чек</button><div id="checkPreview"></div>`;
        document.getElementById("genCheckBtn").onclick = () => {
            let total = parseFloat(document.getElementById("qty").value) * parseFloat(document.getElementById("price").value);
            let check = { number: chNum, name: document.getElementById("docName").value, date: new Date().toLocaleString(), place: "Москва, Пандора", organization: document.getElementById("org").value, inn: document.getElementById("inn").value, taxSystem: document.getElementById("tax").value, calculationType: document.getElementById("payType").value, items: [{ name: document.getElementById("goods").value, quantity: parseFloat(document.getElementById("qty").value), price: parseFloat(document.getElementById("price").value), nds:"без НДС" }], total, paymentMethod: document.getElementById("method").value, seller: "Pandora Shop" };
            db.checks.push(check); db.lastCheck = check; saveData();
            document.getElementById("checkPreview").innerHTML = `<pre>${JSON.stringify(check, null, 2)}</pre><button onclick="window.print()">🖨️ Печать</button>`;
            showToast("Чек сохранён");
        };
    };
    window.lastSyncInfo = function() { alert(db.lastSync ? `Последняя синхронизация с пинпадом: ${db.lastSync}` : "Синхронизаций не было"); };
    window.showLastCheck = function() { if(db.lastCheck) dynamicContent.innerHTML = `<pre>${JSON.stringify(db.lastCheck, null, 2)}</pre><button onclick="window.print()">Печать</button>`; else dynamicContent.innerHTML = "<p>Нет чеков</p>"; };
    window.uploadPinpad = function() {
        if(db.products.length===0) { alert("Нет товаров для выгрузки"); return; }
        let pwd = prompt("Подтвердите пароль для выгрузки на пинпад");
        if(pwd !== currentUser.password) { alert("Неверный пароль"); return; }
        const data = JSON.stringify(db.products.map(p=>({barcode:p.barcode, name:p.name, price:p.price})));
        dynamicContent.innerHTML = `<h3>📲 QR-код для пинпада</h3><div id="pinpadQR"></div><button id="confirmPin">ОК (подтвердить сканирование)</button>`;
        new QRCode(document.getElementById("pinpadQR"), { text: data, width: 200, height: 200 });
        document.getElementById("confirmPin").onclick = () => { if(confirm("Вы отсканировали код пинпадом?")) { db.lastSync = new Date().toLocaleString(); saveData(); showToast("Синхронизация записана"); } };
    };
    window.resetConfig = function() {
        if(currentUser.email !== "Ushimura@pandora.biz") { alert("Только главный администратор"); return; }
        if(confirm("СБРОС ВСЕХ ДАННЫХ. Восстановление невозможно!")) { localStorage.clear(); location.reload(); }
    };
    window.helpDoc = function() {
        dynamicContent.innerHTML = `<h3>📘 Инструкция для сотрудников</h3>
        <ul><li><strong>Просмотр товара:</strong> выберите товар → покажет штрихкод, QR, фото.</li>
        <li><strong>Добавление товара:</strong> можно ввести несколько штрихкодов (каждый с новой строки) — создадутся отдельные товары.</li>
        <li><strong>Инвентаризация:</strong> сканируйте штрихкод или вручную меняйте количество.</li>
        <li><strong>Авито транзакции:</strong> фиксируйте продажи, они участвуют в расчёте зарплаты.</li>
        <li><strong>Чеки:</strong> заполните форму, сформируйте и распечатайте.</li>
        <li><strong>Выгрузка на пинпад:</strong> нужен пароль пользователя.</li>
        <li><strong>Смена:</strong> при входе запрашивается открытие смены, таймер на главном экране.</li></ul>
        <p>⚠️ Только администратор может управлять сотрудниками и сбрасывать конфигурацию.</p>`;
    };

    // ---------- Восстановление пароля ----------
    function showRecovery() {
        let email = prompt("Введите email для восстановления пароля");
        if(!email) return;
        let user = db.users.find(u => u.email === email);
        if(!user) { alert("Пользователь не найден"); return; }
        if(!user.secretQuestion) { alert("Для этого пользователя не задан секретный вопрос. Обратитесь к администратору."); return; }
        let answer = prompt(`Секретный вопрос: ${user.secretQuestion}`);
        if(answer && answer.toLowerCase() === user.secretAnswer) {
            let newPass = prompt("Введите новый пароль");
            if(newPass) { user.password = newPass; saveData(); alert("Пароль успешно изменён!"); }
        } else alert("Неверный ответ");
    }

    // ---------- Авторизация и смена ----------
    function showShiftConfirm(cb) {
        let now = new Date();
        if(confirm(`Открыть смену? Текущее время: ${now.toLocaleTimeString()}`)) {
            db.shiftStart = now.toISOString(); saveData(); startShiftTimer(); cb(true);
        } else cb(false);
    }

    loginBtn.onclick = () => {
        let email = loginEmail.value.trim();
        let pass = loginPassword.value;
        let user = db.users.find(u => u.email === email && u.password === pass);
        if(user) {
            currentUser = user;
            if(db.shiftStart && currentUser.email === "Ushimura@pandora.biz") { startShiftTimer(); enterApp(); }
            else { showShiftConfirm(ok => { if(ok) enterApp(); else { currentUser=null; alert("Смена не открыта"); } }); }
        } else alert("Неверный email или пароль");
    };
    forgotLink.onclick = () => showRecovery();

    function enterApp() {
        authScreen.style.display = "none";
        mainApp.style.display = "block";
        currentUserRoleSpan.innerText = currentUser.role;
        currentUserEmailSpan.innerText = currentUser.email;
        renderMainButtons();
        dynamicContent.innerHTML = `<p>✅ Добро пожаловать, ${currentUser.name || currentUser.email}!</p>`;
        let savedTheme = localStorage.getItem("pandora_theme") || "darkorange";
        applyTheme(savedTheme);
        document.querySelectorAll(".theme-btn").forEach(btn => btn.onclick = () => applyTheme(btn.dataset.theme));
        if(db.shiftStart) startShiftTimer();
    }

    loadData();
</script>
</body>
</html>
