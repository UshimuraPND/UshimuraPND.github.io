<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pandora Inventory System</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- JsBarcode для штрихкодов -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- QRCode.js -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #f0f0f0;
        }

        /* Темы */
        body.theme-light {
            background: #f5f5f5;
            color: #111;
        }
        body.theme-light .card, body.theme-light .modal-content, body.theme-light .product-list, body.theme-light .top-bar {
            background: #fff;
            color: #111;
            border-color: #ddd;
        }
        body.theme-light button {
            background: #e0e0e0;
            color: #111;
        }
        body.theme-light button.primary {
            background: #ff8c00;
            color: #fff;
        }
        body.theme-darkorange {
            background: #1e1e1e;
            color: #ffb347;
        }
        body.theme-darkorange .card, body.theme-darkorange .modal-content, body.theme-darkorange .product-list, body.theme-darkorange .top-bar {
            background: #2c2c2c;
            color: #ffb347;
            border-color: #ff8c00;
        }
        body.theme-darkorange button {
            background: #3a3a3a;
            color: #ffb347;
            border-color: #ff8c00;
        }
        body.theme-darkorange button.primary {
            background: #ff8c00;
            color: #1e1e1e;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Авторизация */
        .auth-box {
            max-width: 400px;
            margin: 100px auto;
            background: #2c2c2c;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .auth-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ff8c00;
        }
        .auth-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #555;
            border-radius: 8px;
            background: #1e1e1e;
            color: #fff;
        }
        .auth-box button {
            width: 100%;
            padding: 12px;
            background: #ff8c00;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Главная панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c2c2c;
            padding: 12px 20px;
            border-radius: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .timer-area {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .theme-switch {
            display: flex;
            gap: 10px;
        }
        .theme-btn {
            background: none;
            border: 1px solid #ff8c00;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .buttons-grid button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #3a3a3a;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .buttons-grid button.primary {
            background: #ff8c00;
            color: #1e1e1e;
        }
        .card {
            background: #2c2c2c;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #2c2c2c;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 20px;
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #555;
            padding: 8px;
            text-align: left;
        }
        input, select, textarea {
            background: #1e1e1e;
            border: 1px solid #ff8c00;
            color: inherit;
            padding: 8px;
            border-radius: 8px;
            width: 100%;
            margin: 5px 0;
        }
        .barcode-qr-side {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .barcode-container, .qr-container {
            background: white;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }
        .success-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 20px;
            border-radius: 28px;
            z-index: 1100;
        }
        hr {
            border-color: #ff8c00;
        }
        button:active {
            transform: scale(0.98);
        }
        .footer-info {
            font-size: 0.8rem;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Авторизация -->
    <div id="authScreen" class="auth-box">
        <h2><i class="fas fa-boxes"></i> Pandora Inventory</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="doLoginBtn"><i class="fas fa-sign-in-alt"></i> Вход</button>
        <div class="footer-info">Только авторизованные сотрудники</div>
    </div>

    <!-- Главный интерфейс -->
    <div id="mainApp" style="display: none;">
        <div class="container">
            <div class="top-bar">
                <div class="timer-area"><i class="fas fa-stopwatch"></i> Время в смене: <span id="shiftTimer">00:00:00</span></div>
                <div><i class="fas fa-user-circle"></i> <span id="currentUserRole"></span> - <span id="currentUserEmail"></span></div>
                <div class="theme-switch">
                    <button class="theme-btn" data-theme="dark">🌙 Темная</button>
                    <button class="theme-btn" data-theme="light">☀️ Светлая</button>
                    <button class="theme-btn" data-theme="darkorange">🔥 Оранжевая</button>
                </div>
            </div>
            <div class="buttons-grid" id="mainButtonsGrid">
                <!-- Динамические кнопки будут здесь -->
            </div>
            <div id="dynamicContent" class="card">
                <p>Выберите действие из меню выше.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- ИНИЦИАЛИЗАЦИЯ ХРАНИЛИЩА ----------
    let db = {
        users: [],
        products: [],
        avitoListings: [],
        avitoTransactions: [],
        checks: [],
        lastSync: null,
        lastCheck: null,
        shiftStart: null
    };

    function loadData() {
        const saved = localStorage.getItem("pandora_inv");
        if(saved) {
            const parsed = JSON.parse(saved);
            db = { ...db, ...parsed };
            // Обновляем пароль для главного администратора на новый (если вдруг старый)
            const adminUser = db.users.find(u => u.email === "Ushimura@pandora.biz");
            if(adminUser && adminUser.password !== "ushimura291_biz_biz") {
                adminUser.password = "ushimura291_biz_biz";
                saveData();
            }
        } else {
            // пользователь по умолчанию с новым паролем
            db.users = [{ email: "Ushimura@pandora.biz", password: "ushimura291_biz_biz", role: "Администратор", name: "Ushimura" }];
            db.products = [];
            db.avitoListings = [];
            db.avitoTransactions = [];
            db.checks = [];
            db.lastSync = null;
            db.lastCheck = null;
            db.shiftStart = null;
            saveData();
        }
    }
    function saveData() {
        localStorage.setItem("pandora_inv", JSON.stringify(db));
    }

    // Глобальные переменные
    let currentUser = null;
    let shiftInterval = null;
    let currentTheme = "darkorange";

    // DOM элементы
    const authScreen = document.getElementById("authScreen");
    const mainApp = document.getElementById("mainApp");
    const loginBtn = document.getElementById("doLoginBtn");
    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const shiftTimerSpan = document.getElementById("shiftTimer");
    const currentUserRoleSpan = document.getElementById("currentUserRole");
    const currentUserEmailSpan = document.getElementById("currentUserEmail");
    const dynamicContent = document.getElementById("dynamicContent");
    const buttonsGrid = document.getElementById("mainButtonsGrid");

    // Вспомогательные функции
    function showToast(msg) {
        const toast = document.createElement("div");
        toast.className = "success-toast";
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function applyTheme(theme) {
        document.body.classList.remove("theme-light", "theme-darkorange");
        if(theme === "light") document.body.classList.add("theme-light");
        else if(theme === "darkorange") document.body.classList.add("theme-darkorange");
        else document.body.classList.remove("theme-light", "theme-darkorange");
        currentTheme = theme;
        localStorage.setItem("pandora_theme", theme);
    }

    // Таймер смены
    function startShiftTimer(startTime) {
        if(shiftInterval) clearInterval(shiftInterval);
        shiftInterval = setInterval(() => {
            if(!db.shiftStart) return;
            const start = new Date(db.shiftStart);
            const now = new Date();
            const diff = Math.floor((now - start) / 1000);
            const hours = Math.floor(diff / 3600);
            const mins = Math.floor((diff % 3600) / 60);
            const secs = diff % 60;
            shiftTimerSpan.innerText = `${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);
    }

    // Проверка прав
    function hasRole(allowedRoles) {
        if(!currentUser) return false;
        return allowedRoles.includes(currentUser.role);
    }

    // Отрисовка кнопок в зависимости от роли
    function renderMainButtons() {
        const allButtons = [
            { id: "viewProducts", label: "📦 Просмотр товара", roles: ["Администратор","Модератор","HR","Смотрящий/кладовщик"] },
            { id: "uploadPinpad", label: "📲 Выгрузка на пинпад", roles: ["Администратор","Модератор","Смотрящий/кладовщик"] },
            { id: "addProduct", label: "➕ Добавить товар", roles: ["Администратор","Модератор"] },
            { id: "inventory", label: "🔍 Инвентаризация", roles: ["Администратор","Модератор","Смотрящий/кладовщик"] },
            { id: "manageUsers", label: "👥 Работники", roles: ["Администратор"] },
            { id: "switchUser", label: "🔄 Сменить пользователя", roles: ["Администратор","Модератор","HR","Смотрящий/кладовщик"] },
            { id: "avitoTransactions", label: "💰 Авито транзакции", roles: ["Администратор","Модератор","HR"] },
            { id: "salary", label: "💵 Зарплата сотрудникам", roles: ["Администратор"] },
            { id: "avitoCheck", label: "🧾 Выдать чек для Авито", roles: ["Администратор","Модератор"] },
            { id: "lastSync", label: "🕒 Последняя синхронизация", roles: ["Администратор","Модератор","Смотрящий/кладовщик"] },
            { id: "resetConfig", label: "⚠️ Сброс конфигурации", roles: ["Администратор"] },
            { id: "showLastCheck", label: "📄 Показать последний чек", roles: ["Администратор","Модератор","HR"] },
            { id: "avitoExposition", label: "🏷️ Авито выставка", roles: ["Администратор","Модератор"] }
        ];
        buttonsGrid.innerHTML = "";
        allButtons.forEach(btn => {
            if(hasRole(btn.roles)) {
                const button = document.createElement("button");
                button.innerHTML = btn.label;
                button.onclick = () => window[btn.id]();
                buttonsGrid.appendChild(button);
            }
        });
    }

    // --- ФУНКЦИИ МОДУЛЕЙ ---
    window.viewProducts = function() {
        if(db.products.length === 0) {
            dynamicContent.innerHTML = `<p><i class="fas fa-info-circle"></i> Нет товаров. Добавьте товар.</p>`;
            return;
        }
        let html = `<h3>Список товаров</h3><select id="productSelect" style="margin-bottom:10px">`;
        db.products.forEach(p => {
            html += `<option value="${p.id}">${p.name} (${p.barcode})</option>`;
        });
        html += `</select><button class="primary" id="showProductBarcodeBtn">Показать штрихкод/QR</button>
        <div id="productDetailPanel"></div>`;
        dynamicContent.innerHTML = html;
        document.getElementById("showProductBarcodeBtn").onclick = () => {
            const pid = parseInt(document.getElementById("productSelect").value);
            const product = db.products.find(p => p.id === pid);
            if(product) {
                const panel = document.getElementById("productDetailPanel");
                panel.innerHTML = `
                    <div><strong>${product.name}</strong><br>Штрихкод: ${product.barcode}<br>Цена: ${product.price}₽<br>Параметры: ${product.parameters || "—"}</div>
                    <div class="barcode-qr-side">
                        <div class="barcode-container"><svg id="barcodeGen"></svg></div>
                        <div class="qr-container"><div id="qrCodeGen"></div></div>
                    </div>
                `;
                setTimeout(() => {
                    JsBarcode("#barcodeGen", product.barcode, { format: "CODE128", width: 2, height: 50, displayValue: true });
                    document.getElementById("qrCodeGen").innerHTML = "";
                    new QRCode(document.getElementById("qrCodeGen"), { text: `ТОВАР:${product.barcode}|${product.name}|${product.price}`, width: 128, height: 128 });
                }, 50);
            }
        };
    };

    window.addProduct = function() {
        dynamicContent.innerHTML = `
            <h3>Добавление товара</h3>
            <input type="text" id="prodName" placeholder="Название товара">
            <input type="text" id="prodBarcode" placeholder="Штрихкод (уникальный)">
            <input type="number" id="prodPrice" placeholder="Цена">
            <input type="text" id="prodParams" placeholder="Параметры (размер, цвет и т.д.)">
            <button id="saveProductBtn" class="primary">Сохранить товар</button>
        `;
        document.getElementById("saveProductBtn").onclick = () => {
            const name = document.getElementById("prodName").value.trim();
            const barcode = document.getElementById("prodBarcode").value.trim();
            const price = parseFloat(document.getElementById("prodPrice").value);
            const params = document.getElementById("prodParams").value;
            if(!name || !barcode || isNaN(price)) { alert("Заполните название, штрихкод и цену"); return; }
            if(db.products.some(p => p.barcode === barcode)) { alert("Штрихкод уже существует"); return; }
            const newId = Date.now();
            db.products.push({ id: newId, name, barcode, price, parameters: params, quantity: 0 });
            saveData();
            showToast("Товар добавлен");
            viewProducts();
        };
    };

    window.inventory = function() {
        dynamicContent.innerHTML = `
            <h3>Инвентаризация (учет остатков)</h3>
            <input type="text" id="scanBarcode" placeholder="Отсканируйте штрихкод товара">
            <button id="addInventoryBtn">➕ Добавить +1</button>
            <hr>
            <h4>Текущие остатки:</h4>
            <ul id="inventoryList"></ul>
        `;
        function refreshInvList() {
            const list = document.getElementById("inventoryList");
            if(list) list.innerHTML = db.products.map(p => `<li>${p.name} - ШК: ${p.barcode} - Кол-во: ${p.quantity || 0}</li>`).join("");
        }
        refreshInvList();
        document.getElementById("addInventoryBtn").onclick = () => {
            const barcode = document.getElementById("scanBarcode").value.trim();
            const product = db.products.find(p => p.barcode === barcode);
            if(product) {
                product.quantity = (product.quantity || 0) + 1;
                saveData();
                refreshInvList();
                document.getElementById("scanBarcode").value = "";
                showToast(`Товар ${product.name} +1`);
            } else {
                alert("Товар не найден");
            }
        };
    };

    window.manageUsers = function() {
        let html = `<h3>Управление пользователями</h3><button id="addUserBtn">+ Добавить сотрудника</button><table><th>Email</th><th>Имя</th><th>Роль</th><th>Действия</th></table>`;
        db.users.forEach(u => {
            html += `<tr><td>${u.email}</td><td>${u.name || ''}</td><td><select class="role-select" data-email="${u.email}">
            <option ${u.role==="Администратор"?"selected":""}>Администратор</option>
            <option ${u.role==="Модератор"?"selected":""}>Модератор</option>
            <option ${u.role==="HR"?"selected":""}>HR</option>
            <option ${u.role==="Смотрящий/кладовщик"?"selected":""}>Смотрящий/кладовщик</option>
            </select></td><td><button class="deleteUserBtn" data-email="${u.email}">Удалить</button></td></tr>`;
        });
        html += `</table>`;
        dynamicContent.innerHTML = html;
        document.querySelectorAll(".role-select").forEach(sel => {
            sel.addEventListener("change", (e) => {
                const email = sel.dataset.email;
                const newRole = sel.value;
                const user = db.users.find(u => u.email === email);
                if(user && email !== "Ushimura@pandora.biz") user.role = newRole;
                else if(email === "Ushimura@pandora.biz") { alert("Нельзя изменить роль главного админа"); sel.value = "Администратор"; }
                saveData();
                showToast("Роль обновлена");
            });
        });
        document.querySelectorAll(".deleteUserBtn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const email = btn.dataset.email;
                if(email === "Ushimura@pandora.biz") { alert("Нельзя удалить главного администратора"); return; }
                if(confirm(`Удалить ${email}?`)) {
                    db.users = db.users.filter(u => u.email !== email);
                    saveData();
                    manageUsers();
                }
            });
        });
        document.getElementById("addUserBtn").onclick = () => {
            let newEmail = prompt("Email нового сотрудника");
            if(!newEmail) return;
            if(db.users.find(u => u.email === newEmail)) { alert("Уже существует"); return; }
            let newPass = prompt("Пароль");
            let newName = prompt("Имя");
            let newRole = prompt("Роль (Администратор, Модератор, HR, Смотрящий/кладовщик)", "Смотрящий/кладовщик");
            if(!["Администратор","Модератор","HR","Смотрящий/кладовщик"].includes(newRole)) newRole = "Смотрящий/кладовщик";
            db.users.push({ email: newEmail, password: newPass, name: newName, role: newRole });
            saveData();
            manageUsers();
        };
    };

    window.switchUser = function() { location.reload(); };

    window.avitoTransactions = function() {
        let html = `<h3>Авито транзакции</h3><button id="newTransBtn">+ Новая транзакция</button><table><th>ID транзакции</th><th>Тип</th><th>Покупатель</th><th>Сумма</th><th>Работник</th></tr>`;
        db.avitoTransactions.forEach(t => {
            html += `<tr><td>${t.transactionId}</td><td>${t.type}</td><td>${t.buyerName}</td><td>${t.amount}₽</td><td>${t.worker}</td></tr>`;
        });
        html += `</table>`;
        dynamicContent.innerHTML = html;
        document.getElementById("newTransBtn").onclick = () => {
            let tid = prompt("ID транзакции");
            let type = prompt("Тип (доставка/личная встреча)");
            let contact = prompt("Контакт покупателя");
            let buyer = prompt("ФИО покупателя");
            let worker = prompt("Работник, принявший заказ", currentUser.name || currentUser.email);
            let amount = parseFloat(prompt("Сумма сделки"));
            if(tid && type && amount) {
                db.avitoTransactions.push({ id: Date.now(), transactionId: tid, type, contact, buyerName: buyer, worker, amount, date: new Date().toISOString() });
                saveData();
                avitoTransactions();
                showToast("Транзакция добавлена");
            }
        };
    };

    window.salary = function() {
        if(currentUser.email !== "Ushimura@pandora.biz") { alert("Доступно только администратору"); return; }
        const now = new Date();
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const allTrans = db.avitoTransactions;
        const totalAll = allTrans.reduce((sum, t) => sum + (t.amount || 0), 0);
        const totalMonth = allTrans.filter(t => new Date(t.date) >= monthStart).reduce((sum, t) => sum + (t.amount || 0), 0);
        let html = `<h3>Финансы и зарплаты</h3><p>Общая сумма за всё время: ${totalAll}₽</p><p>Сумма за текущий месяц: ${totalMonth}₽</p>
        <h4>Распределение (проценты от суммы сделок):</h4><p>Рекомендуемый фонд оплаты: 30% от выручки = ${(totalMonth*0.3).toFixed(2)}₽</p>
        <p><i>Администратор может редактировать процент для каждой роли вручную</i></p>
        <table><th>Роль</th><th>Процент</th><th>Сумма (за месяц)</th></tr>
        <tr><td>Администратор</td><td><input id="percAdmin" value="50"></td><td id="sumAdmin">0</td></tr>
        <tr><td>Модератор</td><td><input id="percMod" value="30"></td><td id="sumMod">0</td></tr>
        <tr><td>HR</td><td><input id="percHr" value="10"></td><td id="sumHr">0</td></tr>
        <tr><td>Смотрящий/кладовщик</td><td><input id="percWatcher" value="10"></td><td id="sumWatcher">0</td></tr>
        </table><button id="calcSalaryBtn">Рассчитать зарплаты</button>`;
        dynamicContent.innerHTML = html;
        document.getElementById("calcSalaryBtn").onclick = () => {
            const fund = totalMonth * 0.3;
            const pAdmin = parseFloat(document.getElementById("percAdmin").value) / 100;
            const pMod = parseFloat(document.getElementById("percMod").value) / 100;
            const pHr = parseFloat(document.getElementById("percHr").value) / 100;
            const pWatch = parseFloat(document.getElementById("percWatcher").value) / 100;
            const sum = fund;
            document.getElementById("sumAdmin").innerText = (sum * pAdmin).toFixed(2);
            document.getElementById("sumMod").innerText = (sum * pMod).toFixed(2);
            document.getElementById("sumHr").innerText = (sum * pHr).toFixed(2);
            document.getElementById("sumWatcher").innerText = (sum * pWatch).toFixed(2);
        };
    };

    window.avitoCheck = function() {
        let checkNumber = db.checks.length + 1;
        let html = `<h3>Генерация чека для Авито</h3>
        <input id="docName" value="Чек Авито №${checkNumber}">
        <input id="orgName" placeholder="Организация/ИП" value="ООО Пандора">
        <input id="inn" placeholder="ИНН" value="1234567890">
        <input id="taxSystem" placeholder="Система налогообложения" value="УСН">
        <input id="paymentType" placeholder="Вид расчёта (приход/возврат)" value="Приход">
        <input id="productNames" placeholder="Наименование товара" value="Товар с Авито">
        <input id="quantity" type="number" value="1">
        <input id="priceUnit" type="number" placeholder="Цена за ед.">
        <input id="paymentMethod" placeholder="Способ оплаты" value="Наличные/Карта">
        <button id="generateCheckBtn">Сформировать чек</button>`;
        dynamicContent.innerHTML = html;
        document.getElementById("generateCheckBtn").onclick = () => {
            const docName = document.getElementById("docName").value;
            const org = document.getElementById("orgName").value;
            const inn = document.getElementById("inn").value;
            const tax = document.getElementById("taxSystem").value;
            const payType = document.getElementById("paymentType").value;
            const goods = document.getElementById("productNames").value;
            const qty = parseFloat(document.getElementById("quantity").value);
            const price = parseFloat(document.getElementById("priceUnit").value);
            const method = document.getElementById("paymentMethod").value;
            const total = qty * price;
            const checkData = {
                number: checkNumber,
                name: docName,
                date: new Date().toLocaleString(),
                place: "Москва, ул. Пандора",
                organization: org, inn, taxSystem: tax, calculationType: payType,
                items: [{ name: goods, quantity: qty, price: price, nds: "без НДС" }],
                total: total,
                paymentMethod: method, seller: "Pandora Shop"
            };
            db.checks.push(checkData);
            db.lastCheck = checkData;
            saveData();
            let receiptHtml = `<h4>ЧЕК</h4><pre>${JSON.stringify(checkData, null, 2)}</pre><button onclick="window.print()">Печать</button>`;
            dynamicContent.innerHTML += `<div class="card">${receiptHtml}</div>`;
            showToast("Чек сохранён");
        };
    };

    window.lastSync = function() { alert(db.lastSync ? `Последняя синхронизация: ${db.lastSync}` : "Синхронизаций не было"); };
    window.showLastCheck = function() { if(db.lastCheck) dynamicContent.innerHTML = `<pre>${JSON.stringify(db.lastCheck, null, 2)}</pre>`; else dynamicContent.innerHTML = "<p>Нет чеков</p>"; };
    window.avitoExposition = function() {
        let html = `<h3>Авито выставка</h3><button id="addListingBtn">+ Выставить товар</button><tr><th>Товар</th><th>Цена</th><th>Статус</th><th>Действие</th></tr>`;
        db.avitoListings.forEach(l => {
            html += `<tr><td>${l.productName}</td><td>${l.price}₽</td><td>${l.status}</td><td><button class="toggleStatus" data-id="${l.id}">Сменить статус</button></td></tr>`;
        });
        html += `</table>`;
        dynamicContent.innerHTML = html;
        document.getElementById("addListingBtn").onclick = () => {
            let pname = prompt("Название товара на Авито");
            let price = prompt("Цена");
            if(pname && price) {
                db.avitoListings.push({ id: Date.now(), productName: pname, price: parseFloat(price), status: "не продан" });
                saveData();
                avitoExposition();
            }
        };
        document.querySelectorAll(".toggleStatus").forEach(btn => {
            btn.onclick = (e) => {
                let id = parseInt(btn.dataset.id);
                let listing = db.avitoListings.find(l => l.id === id);
                if(listing) listing.status = listing.status === "продан" ? "не продан" : "продан";
                saveData();
                avitoExposition();
            };
        });
    };

    window.uploadPinpad = function() {
        if(db.products.length === 0) { alert("Нет товаров для выгрузки"); return; }
        const productsJson = JSON.stringify(db.products.map(p => ({ barcode: p.barcode, name: p.name, price: p.price })));
        dynamicContent.innerHTML = `<h3>Выгрузка на пинпад</h3><div id="pinpadQR"></div><button id="confirmScan">ОК (подтвердить сканирование)</button>`;
        new QRCode(document.getElementById("pinpadQR"), { text: productsJson, width: 200, height: 200 });
        document.getElementById("confirmScan").onclick = () => {
            if(confirm("Вы отсканировали код пинпадом?")) {
                db.lastSync = new Date().toLocaleString();
                saveData();
                showToast("Синхронизация зафиксирована");
            }
        };
    };

    window.resetConfig = function() {
        if(currentUser.email !== "Ushimura@pandora.biz") { alert("Только главный администратор"); return; }
        if(confirm("СБРОС ВСЕХ ДАННЫХ (товары, пользователи, транзакции). Необратимо!")) {
            localStorage.clear();
            location.reload();
        }
    };

    // --- АВТОРИЗАЦИЯ И ПОДТВЕРЖДЕНИЕ СМЕНЫ ---
    function showShiftConfirm(callback) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString();
        const confirmBox = confirm(`Открыть смену? Текущее время: ${timeStr}\nНажмите ОК для начала смены`);
        if(confirmBox) {
            db.shiftStart = now.toISOString();
            saveData();
            startShiftTimer(db.shiftStart);
            callback(true);
        } else {
            callback(false);
        }
    }

    loginBtn.onclick = () => {
        const email = loginEmail.value.trim();
        const pass = loginPassword.value;
        const user = db.users.find(u => u.email === email && u.password === pass);
        if(user) {
            currentUser = user;
            if(db.shiftStart && currentUser.email === "Ushimura@pandora.biz") {
                // если уже смена открыта
                startShiftTimer(db.shiftStart);
                enterMainApp();
            } else {
                showShiftConfirm((ok) => {
                    if(ok) enterMainApp();
                    else { currentUser = null; alert("Смена не открыта"); }
                });
            }
        } else {
            alert("Неверные учетные данные или регистрация недоступна.");
        }
    };

    function enterMainApp() {
        authScreen.style.display = "none";
        mainApp.style.display = "block";
        currentUserRoleSpan.innerText = currentUser.role;
        currentUserEmailSpan.innerText = currentUser.email;
        renderMainButtons();
        dynamicContent.innerHTML = `<p>Добро пожаловать, ${currentUser.name || currentUser.email}! Выберите действие.</p>`;
        const savedTheme = localStorage.getItem("pandora_theme") || "darkorange";
        applyTheme(savedTheme);
        document.querySelectorAll(".theme-btn").forEach(btn => {
            btn.onclick = (e) => applyTheme(btn.dataset.theme);
        });
        if(db.shiftStart) startShiftTimer(db.shiftStart);
    }

    loadData();
</script>
</body>
</html>
